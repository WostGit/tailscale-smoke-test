name: "Tailscale Direct P2P Test"
on: workflow_dispatch

jobs:
  p2p-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet (Forcing Direct)
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          # FORCE a specific port and disable rotation to help the hole-punch
          args: --port=41641 --snat-subnet-routes=false --accept-routes=false

      - name: 🏎️ Bandwidth & P2P Verification
        run: |
          MY_IP=$(tailscale ip -4)
          # Get the other runner's IP
          PEER_IP=$(tailscale status --json | jq -r ".Peer[] | select(.TailscaleIPs[0] != \"$MY_IP\") | .TailscaleIPs[0]" | head -n 1)
          
          echo "My IP: $MY_IP | Peer IP: $PEER_IP"
          
          # Force a discovery ping
          echo "Punching hole to $PEER_IP..."
          tailscale ping --c 10 --tsmp $PEER_IP
          
          # Check if the connection flipped to 'direct'
          CONN_TYPE=$(tailscale status --json | jq -r ".Peer[] | select(.TailscaleIPs[0] == \"$PEER_IP\") | .CurAddr")
          
          if [[ "$CONN_TYPE" == *"relay"* ]]; then
            echo "❌ STILL RELAYED ($CONN_TYPE). Bandwidth will be capped at ~10Mbps."
            # We fail the smoke test here because 7B training will crawl
            exit 1 
          else
            echo "✅ DIRECT CONNECTION ESTABLISHED ($CONN_TYPE)!"
          fi

      - name: 📊 Performance Baseline
        if: success()
        run: |
          # Use netcat (nc) to see if we can push at least 50MB/s
          if [ "${{ matrix.rank }}" == "0" ]; then
            timeout 20s nc -l 9999 > /dev/null
          else
            sleep 5
            dd if=/dev/zero bs=1m count=100 | nc -v $(tailscale status --json | jq -r ".Peer[] | select(.TailscaleIPs[0] != \"$(tailscale ip -4)\") | .TailscaleIPs[0]") 9999
          fi
