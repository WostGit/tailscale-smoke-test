name: "Tailscale Python Benchmark"
on: workflow_dispatch

jobs:
  p2p-benchmark:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset --accept-routes=false --accept-dns=false
        env:
          TS_EXTRA_ARGS: "--port=41641"

      - name: 🔍 Debug & Discover
        run: |
          # Give it a moment to settle
          sleep 10
          MY_IP=$(tailscale ip -4)
          echo "My Tailscale IP: $MY_IP"
          
          # DUMP STATUS: This helps us see if the other peer is 'offline' or 'missing'
          echo "--- Current Tailscale Status ---"
          tailscale status
          
          echo "Scanning for peer..."
          PEER_IP=""
          for i in {1..20}; do
            # We filter for ANY other 100.x.x.x address that isn't ours
            PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[] | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)
            
            if [ ! -z "$PEER_IP" ] && [ "$PEER_IP" != "null" ]; then
              echo "✅ Peer Found: $PEER_IP"
              break
            fi
            echo "Waiting for peer ($i/20)..."
            sleep 5
          done

          if [ -z "$PEER_IP" ]; then
            echo "❌ ERROR: No peers found. Is the other runner up?"
            exit 1
          fi

          # (Rest of the Python bench.py generation goes here...)
          # Export for the Python script
          echo "PEER_IP=$PEER_IP" >> $GITHUB_ENV
          echo "RANK=${{ matrix.rank }}" >> $GITHUB_ENV

      - name: 🐍 Execute Python Bench
        run: |
          # Use the environment variables from the previous step
          python3 -c "
          import socket, time, os
          PORT = 9999
          SIZE_MB = 200
          def run_server():
              s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              s.bind(('0.0.0.0', PORT))
              s.listen(1)
              print('Waiting for connection...')
              conn, addr = s.accept()
              start = time.time()
              while conn.recv(1024*1024): pass
              print(f'Done in {time.time()-start:.2f}s')
          def run_client(ip):
              time.sleep(5)
              s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              s.connect((ip, PORT))
              for _ in range(SIZE_MB): s.sendall(b'0'*1024*1024)
          if os.environ['RANK'] == '0': run_server()
          else: run_client(os.environ['PEER_IP'])
          "
