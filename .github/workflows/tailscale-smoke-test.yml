name: "Tailscale Research Benchmark (Final)"
on: workflow_dispatch

jobs:
  p2p-benchmark:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset
        env:
          TS_EXTRA_ARGS: "--port=41641"

      - name: 🏎️ OS-Native Saturation Test
        run: |
          MY_IP=$(tailscale ip -4)
          
          # 1. Discovery
          for i in {1..20}; do
            PEER_IP=$(tailscale status --json | jq -r 'if .Peer != null then .Peer[] | select(.TailscaleIPs[0] != "'$MY_IP'") | .TailscaleIPs[0] else empty end' | head -n 1)
            if [ ! -z "$PEER_IP" ] && [ "$PEER_IP" != "null" ]; then break; fi
            sleep 5
          done

          if [ "${{ matrix.rank }}" == "0" ]; then
            echo "🚀 Rank 0: Hosting Socket via Background Loop..."
            # Keep listening until the 'stop_test' file appears
            while [ ! -f /tmp/stop_test ]; do
              nc -l 9999 > /dev/null
            done &
            LOOP_PID=$!
            sleep 45
            touch /tmp/stop_test
            kill $LOOP_PID || true
          else
            echo "🏎️ Rank 1: Syncing with $PEER_IP..."
            sleep 20
            
            # 2. Performance Metric 1: Latency
            tailscale ping --c 3 --tsmp $PEER_IP
            
            # 3. Performance Metric 2: Throughput
            echo "🔥 Executing 500MB saturation..."
            # On macOS, dd prints stats to stderr when it's done
            dd if=/dev/zero bs=1m count=500 | nc -v -n $PEER_IP 9999
          fi
