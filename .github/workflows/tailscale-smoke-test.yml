name: "Tailscale Direct P2P Test"
on: workflow_dispatch

jobs:
  p2p-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          # REMOVED ALL CUSTOM ARGS TO AVOID FLAG ERRORS
        env:
          # We still keep the port for the background daemon
          TS_EXTRA_ARGS: "--port=41641"

      - name: 🏎️ P2P Discovery
        run: |
          # Wait up to 2 minutes for both to be online
          for i in {1..24}; do
            MY_IP=$(tailscale ip -4)
            PEER_IP=$(tailscale status --json | jq -r ".Peer[] | select(.TailscaleIPs[0] != \"$MY_IP\") | .TailscaleIPs[0]" | head -n 1)
            
            if [ ! -z "$PEER_IP" ] && [ "$PEER_IP" != "null" ]; then
              echo "✅ Peer Found: $PEER_IP"
              tailscale ping --c 5 $PEER_IP
              tailscale status
              exit 0
            fi
            echo "Attempt $i: Waiting for peer..."
            sleep 5
          done
          exit 1
