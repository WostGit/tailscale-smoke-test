name: "Tailscale High-Speed Benchmark (Multiprocessing)"
on: workflow_dispatch

jobs:
  p2p-benchmark:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset
        env:
          TS_EXTRA_ARGS: "--port=41641"

      - name: 🚀 Multiprocessing P2P Stress Test
        run: |
          MY_IP=$(tailscale ip -4)
          PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)

          cat <<'EOF' > bench.py
          import socket, time, os, multiprocessing

          PORT_BASE = 9990
          SIZE_MB = 200 
          STREAMS = 8  # Increased parallelism
          CHUNK_SIZE = 4 * 1024 * 1024 # 4MB Buffer for efficiency

          def run_sink(port):
              with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                  s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                  s.bind(('0.0.0.0', port))
                  s.listen(1)
                  conn, addr = s.accept()
                  with conn:
                      while conn.recv(CHUNK_SIZE): pass

          def run_blast(ip, port):
              data = b'\0' * CHUNK_SIZE
              for _ in range(10): # Retry loop
                  try:
                      with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                          s.connect((ip, port))
                          for _ in range(SIZE_MB // (CHUNK_SIZE // (1024*1024))): 
                              s.sendall(data)
                          return
                  except: time.sleep(1)

          if __name__ == "__main__":
              rank = os.environ.get("RANK")
              peer = os.environ.get("PEER_IP")
              processes = []
              
              start = time.time()
              for i in range(STREAMS):
                  target = run_sink if rank == "0" else run_blast
                  args = (PORT_BASE + i,) if rank == "0" else (peer, PORT_BASE + i)
                  p = multiprocessing.Process(target=target, args=args)
                  p.start()
                  processes.append(p)

              for p in processes: p.join()
              
              if rank == "0":
                  duration = time.time() - start
                  total_gbits = (SIZE_MB * STREAMS * 8) / 1024
                  print(f"📊 Result: {SIZE_MB * STREAMS}MB in {duration:.2f}s ({(SIZE_MB * STREAMS * 8)/duration:.2f} Mbps)")
          EOF

          export RANK=${{ matrix.rank }}
          export PEER_IP=$PEER_IP
          python3 bench.py
