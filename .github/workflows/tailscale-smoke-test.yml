name: "Tailscale Throughput Benchmark"
on: workflow_dispatch

jobs:
  iperf-benchmark:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset
        env:
          TS_EXTRA_ARGS: "--port=41641"

      - name: 🏎️ P2P Discovery & iperf3
        run: |
          brew install iperf3
          MY_IP=$(tailscale ip -4)
          
          echo "Scanning for peer..."
          for i in {1..20}; do
            PEER_IP=$(tailscale status --json | jq -r 'if .Peer != null then .Peer[] | select(.TailscaleIPs[0] != "'$MY_IP'") | .TailscaleIPs[0] else empty end' | head -n 1)
            if [ ! -z "$PEER_IP" ]; then break; fi
            sleep 5
          done

          if [ "${{ matrix.rank }}" == "0" ]; then
            echo "🚀 Rank 0: Listening for Benchmark..."
            iperf3 -s -1
          else
            echo "🏎️ Rank 1: Stress Testing to $PEER_IP..."
            sleep 15 # Wait for Server to be ready
            # -P 8 (8 parallel streams) to truly saturate the link
            # -J (output JSON for your paper's data)
            iperf3 -c $PEER_IP -t 15 -P 8
          fi
