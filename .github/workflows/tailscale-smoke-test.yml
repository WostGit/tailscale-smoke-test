name: "Tailscale High-Speed Benchmark"
on: workflow_dispatch

jobs:
  p2p-benchmark:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset
        env:
          TS_EXTRA_ARGS: "--port=41641"

      - name: 🚀 Parallel P2P Stress Test
        run: |
          MY_IP=$(tailscale ip -4)
          PEER_IP=$(tailscale status --json | jq -r --arg me "$MY_IP" '.Peer | values[]? | select(.TailscaleIPs[0] != $me) | .TailscaleIPs[0]' | head -n 1)

          cat <<'EOF' > bench.py
          import socket, time, os, threading

          PORT = 9999
          SIZE_MB = 200 
          STREAMS = 4  # Parallel connections

          def handle_server_stream(conn):
              with conn:
                  while conn.recv(1024*1024): pass

          def run_server():
              print(f"🚀 Rank 0: Starting {STREAMS} Parallel Sinks...")
              s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              s.bind(('0.0.0.0', PORT))
              s.listen(STREAMS)
              
              threads = []
              start = time.time()
              for _ in range(STREAMS):
                  conn, addr = s.accept()
                  t = threading.Thread(target=handle_server_stream, args=(conn,))
                  t.start()
                  threads.append(t)
              
              for t in threads: t.join()
              duration = time.time() - start
              total_bits = SIZE_MB * STREAMS * 1024 * 1024 * 8
              print(f"📊 Result: {SIZE_MB * STREAMS}MB in {duration:.2f}s ({total_bits/(duration*1e6):.2f} Mbps)")

          def run_client(ip):
              print(f"🏎️ Rank 1: Launching {STREAMS} Parallel Blasts...")
              time.sleep(5)
              def blast():
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      s.connect((ip, PORT))
                      for _ in range(SIZE_MB): s.sendall(b'\0' * (1024*1024))
              
              threads = [threading.Thread(target=blast) for _ in range(STREAMS)]
              for t in threads: t.start()
              for t in threads: t.join()

          if __name__ == "__main__":
              if os.environ['RANK'] == '0': run_server()
              else: run_client(os.environ['PEER_IP'])
          EOF

          export RANK=${{ matrix.rank }}
          export PEER_IP=$PEER_IP
          python3 bench.py
