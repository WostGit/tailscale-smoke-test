name: "Tailscale Direct P2P Test"
on: workflow_dispatch

jobs:
  p2p-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet (Direct Mode)
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          # Logic flags go in 'args'
          args: --snat-subnet-routes=false --accept-routes=false
        env:
          # DAEMON flags go here in 2026 v4 Action
          TS_EXTRA_ARGS: "--port=41641"

      - name: 🩺 Network Diagnostic
        run: |
          echo "--- NAT & UDP Check ---"
          tailscale netcheck
          echo "--- Tailscale Status ---"
          tailscale status

      - name: 🏎️ P2P Discovery & Hole-Punch
        run: |
          MY_IP=$(tailscale ip -4)
          PEER_IP=$(tailscale status --json | jq -r ".Peer[] | select(.TailscaleIPs[0] != \"$MY_IP\") | .TailscaleIPs[0]" | head -n 1)
          
          if [ -z "$PEER_IP" ] || [ "$PEER_IP" == "null" ]; then
            echo "Waiting for peer..."
            sleep 15
            PEER_IP=$(tailscale status --json | jq -r ".Peer[] | select(.TailscaleIPs[0] != \"$MY_IP\") | .TailscaleIPs[0]" | head -n 1)
          fi

          echo "Attempting P2P Hole-Punch to $PEER_IP..."
          # The --tsmp flag uses Tailscale's internal messaging to force a path
          tailscale ping --c 10 --tsmp $PEER_IP
          
          # Final path check
          tailscale status | grep $PEER_IP
