name: "Tailscale Zero-Install Benchmark"
on: workflow_dispatch

jobs:
  p2p-benchmark:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset
        env:
          TS_EXTRA_ARGS: "--port=41641"

      - name: 🏎️ NC Saturation Test (macOS Native)
        run: |
          MY_IP=$(tailscale ip -4)
          
          echo "Scanning for peer..."
          for i in {1..20}; do
            PEER_IP=$(tailscale status --json | jq -r 'if .Peer != null then .Peer[] | select(.TailscaleIPs[0] != "'$MY_IP'") | .TailscaleIPs[0] else empty end' | head -n 1)
            if [ ! -z "$PEER_IP" ] && [ "$PEER_IP" != "null" ]; then break; fi
            sleep 5
          done

          if [ "${{ matrix.rank }}" == "0" ]; then
            echo "🚀 Rank 0: Listening on port 9999..."
            # Start listener in background, dump to /dev/null
            nc -l 9999 > /dev/null &
            NC_PID=$!
            sleep 30
            kill $NC_PID || true
          else
            echo "🏎️ Rank 1: Blasting 500MB of data to $PEER_IP..."
            sleep 10 # Let Rank 0 set up the listener
            
            # Use 'dd' to pump data. 
            # Output will show transfer rate in MB/s automatically on macOS!
            dd if=/dev/zero bs=1m count=500 | nc -v -n $PEER_IP 9999
          fi
