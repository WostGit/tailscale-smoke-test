name: "Tailscale Bandwidth Test"
on: workflow_dispatch

jobs:
  p2p-iperf:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner
          args: --reset
        env:
          TS_EXTRA_ARGS: "--port=41641"

      - name: 🏎️ NAT Hole-Punch & iperf3 Setup
        run: |
          brew install iperf3
          MY_IP=$(tailscale ip -4)
          
          # Discovery Loop
          for i in {1..20}; do
            PEER_IP=$(tailscale status --json | jq -r 'if .Peer != null then .Peer[] | select(.TailscaleIPs[0] != "'$MY_IP'") | .TailscaleIPs[0] else empty end' | head -n 1)
            if [ ! -z "$PEER_IP" ]; then break; fi
            sleep 5
          done

          echo "✅ Peer Found: $PEER_IP"

          if [ "${{ matrix.rank }}" == "0" ]; then
            echo "🚀 Rank 0: Starting iperf3 Server..."
            # -s: server mode, -1: handle one test and exit
            iperf3 -s -1
          else
            echo "🏎️ Rank 1: Starting 10s Stress Test to $PEER_IP..."
            sleep 15 # Give Rank 0 time to start brew install + server
            # -c: client, -t: duration, -P: parallel streams for max throughput
            iperf3 -c $PEER_IP -t 10 -P 4
          fi
