name: "Tailscale P2P Smoke Test"
on: workflow_dispatch

jobs:
  smoke-test:
    runs-on: macos-15
    strategy:
      matrix:
        rank: [0, 1]
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Join Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: 🔍 P2P Discovery (Non-Self Filter)
        run: |
          MY_IP=$(tailscale ip -4)
          echo "My local Tailscale IP: $MY_IP"
          
          echo "Waiting for peer to appear..."
          # 24 attempts * 5s = 120 seconds total wait time
          for i in {1..24}; do
            # Find any IP in the tailnet that is NOT mine
            PEER_IP=$(tailscale status --json | jq -r ".Peer[] | select(.TailscaleIPs[0] != \"$MY_IP\") | .TailscaleIPs[0]" | head -n 1)
            
            if [ ! -z "$PEER_IP" ] && [ "$PEER_IP" != "null" ]; then
              echo "✅ PEER DISCOVERED: $PEER_IP"
              echo "🛰️ Attempting P2P Hole-Punch..."
              
              # tailscale ping is better than system ping because it triggers 
              # the direct path discovery process.
              tailscale ping --c 5 $PEER_IP
              
              echo "--- Connection Details ---"
              tailscale status
              exit 0
            fi
            
            echo "Attempt $i: Peer not visible yet. Retrying..."
            sleep 5
          done

          echo "❌ TIMEOUT: Peer never joined the tailnet."
          tailscale status
          exit 1
